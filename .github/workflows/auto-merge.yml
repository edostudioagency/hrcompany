name: Auto-merge claude/code-review-security-1Mpcc into main

on:
  push:
    branches:
      - claude/code-review-security-1Mpcc

jobs:
  auto-merge:
    name: Auto-merge into main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge claude/code-review-security-1Mpcc into main
        run: |
          git checkout main
          git merge origin/claude/code-review-security-1Mpcc --no-ff -m "chore: auto-merge claude/code-review-security-1Mpcc into main"
          git push origin main
